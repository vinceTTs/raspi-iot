---
- name: Configure Dropbox access on Raspberry Pi
  hosts: local
  become: true

  vars:
    dropbox_remote_name: dropbox
    dropbox_user: "{{ ansible_user | default('raspi') }}"
    dropbox_group: "{{ dropbox_user }}"
    dropbox_home: "/home/{{ dropbox_user }}"
    dropbox_config_dir: "{{ dropbox_home }}/.config/rclone"
    dropbox_config_file: "{{ dropbox_config_dir }}/rclone.conf"
    dropbox_token_file: "{{ playbook_dir }}/dropbox_token.json"
    dropbox_token_from_file: "{{ lookup('ansible.builtin.file', dropbox_token_file, errors='ignore') | trim }}"
    dropbox_token_effective: "{{ (dropbox_token | default('', true)) or dropbox_token_from_file }}"
    dropbox_access_token_file: "{{ playbook_dir }}/dropbox_access.token"
    dropbox_access_token_from_env: "{{ lookup('ansible.builtin.env', 'DROPBOX_ACCESS_TOKEN') | trim }}"
    dropbox_access_token_from_file: "{{ lookup('ansible.builtin.file', dropbox_access_token_file, errors='ignore') | trim }}"
    dropbox_access_token_effective: "{{ (dropbox_access_token | default('', true)) or dropbox_access_token_from_env or dropbox_access_token_from_file }}"
    dropbox_auth_effective: "{{ dropbox_token_effective or dropbox_access_token_effective }}"
    dropbox_source_path: ""
    dropbox_download_dir: /opt/dropbox-download
    dropbox_copy_enable: true
    dropbox_copy_schedule: "*-*-* 03:00:00"
    dropbox_filter_file: "{{ dropbox_config_dir }}/dropbox-download.filter"
    dropbox_copy_log_file: "{{ dropbox_config_dir }}/dropbox-rclone-copy.log"
    dropbox_filter_patterns:
      - "*.jpg"
      - "*.jpeg"
      - "*.JPG"
      - "*.JPEG"
    dropbox_mount_point: /mnt/dropbox
    dropbox_enable_mount: false
    dropbox_mount_options:
      - --allow-other
      - --dir-cache-time=72h
      - --vfs-cache-mode=full
      - --vfs-cache-max-age=24h
  pre_tasks:
    - name: Ensure Dropbox access token is provided
      ansible.builtin.assert:
        that:
          - dropbox_auth_effective | length > 0
        fail_msg: >-
          Keine Dropbox-Anmeldedaten gefunden. Übergib entweder -e "dropbox_token=...",
          -e "dropbox_access_token=...", setze die Umgebungsvariable DROPBOX_ACCESS_TOKEN,
          lege die Datei {{ dropbox_token_file }} mit einem vollständigen rclone-Token-JSON an
          oder lege die Datei {{ dropbox_access_token_file }} mit einem reinen Access-Token an.
        success_msg: Dropbox-Anmeldedaten gefunden.
      no_log: true

  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install rclone and FUSE packages
      ansible.builtin.apt:
        name:
          - rclone
          - fuse3
        state: present

    - name: Ensure rclone config directory exists
      ansible.builtin.file:
        path: "{{ dropbox_config_dir }}"
        state: directory
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0700'

    - name: Write rclone config for Dropbox
      ansible.builtin.copy:
        dest: "{{ dropbox_config_file }}"
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0600'
        content: |
          [{{ dropbox_remote_name }}]
          type = dropbox
          token = {{ dropbox_auth_effective }}
      no_log: true

    - name: Ensure Dropbox mount directory exists
      ansible.builtin.file:
        path: "{{ dropbox_mount_point }}"
        state: directory
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0755'

    - name: Ensure Dropbox download directory exists
      ansible.builtin.file:
        path: "{{ dropbox_download_dir }}"
        state: directory
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0755'

    - name: Write Dropbox download filter file
      ansible.builtin.copy:
        dest: "{{ dropbox_filter_file }}"
        owner: "{{ dropbox_user }}"
        group: "{{ dropbox_group }}"
        mode: '0600'
        content: |
          {% for pattern in dropbox_filter_patterns %}
          + {{ pattern }}
          {% endfor %}
          - **
      when: dropbox_filter_patterns | length > 0

    - name: Create Dropbox copy script
      ansible.builtin.copy:
        dest: /usr/local/bin/dropbox-copy.sh
        owner: root
        group: root
        mode: '0755'
        content: |
          #!/bin/bash
          set -euo pipefail

          /usr/bin/rclone copy "{{ dropbox_remote_name }}:{{ dropbox_source_path }}" "{{ dropbox_download_dir }}" \
            --config "{{ dropbox_config_file }}" \
            --create-empty-src-dirs \
            --log-file "{{ dropbox_copy_log_file }}" \
            --log-level INFO{% if dropbox_filter_patterns | length > 0 %} \
            --filter-from "{{ dropbox_filter_file }}"{% endif %}
      when: dropbox_copy_enable | bool

    - name: Test Dropbox connection
      ansible.builtin.command:
        argv:
          - rclone
          - lsd
          - "{{ dropbox_remote_name }}:"
          - --config
          - "{{ dropbox_config_file }}"
      become_user: "{{ dropbox_user }}"
      changed_when: false
      register: dropbox_test

    - name: Create systemd service for Dropbox copy
      ansible.builtin.copy:
        dest: /etc/systemd/system/dropbox-rclone-copy.service
        mode: '0644'
        content: |
          [Unit]
          Description=Download selected files from Dropbox via rclone copy
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=oneshot
          User={{ dropbox_user }}
          Group={{ dropbox_group }}
          ExecStart=/usr/local/bin/dropbox-copy.sh
      when: dropbox_copy_enable | bool

    - name: Create systemd timer for Dropbox copy
      ansible.builtin.copy:
        dest: /etc/systemd/system/dropbox-rclone-copy.timer
        mode: '0644'
        content: |
          [Unit]
          Description=Run Dropbox download once per day

          [Timer]
          OnCalendar={{ dropbox_copy_schedule }}
          Persistent=true

          [Install]
          WantedBy=timers.target
      when: dropbox_copy_enable | bool

    - name: Enable and start Dropbox copy timer
      ansible.builtin.systemd:
        name: dropbox-rclone-copy.timer
        enabled: true
        state: started
        daemon_reload: true
      when: dropbox_copy_enable | bool

    - name: Create systemd service for Dropbox mount
      ansible.builtin.copy:
        dest: /etc/systemd/system/dropbox-rclone.service
        mode: '0644'
        content: |
          [Unit]
          Description=Dropbox mount via rclone
          Wants=network-online.target
          After=network-online.target

          [Service]
          Type=simple
          User={{ dropbox_user }}
          Group={{ dropbox_group }}
          ExecStart=/usr/bin/rclone mount {{ dropbox_remote_name }}: {{ dropbox_mount_point }} --config {{ dropbox_config_file }} {{ dropbox_mount_options | join(' ') }}
          ExecStop=/bin/fusermount3 -uz {{ dropbox_mount_point }}
          Restart=on-failure
          RestartSec=10

          [Install]
          WantedBy=multi-user.target
      when: dropbox_enable_mount | bool

    - name: Enable and start Dropbox mount service
      ansible.builtin.systemd:
        name: dropbox-rclone.service
        enabled: true
        state: started
        daemon_reload: true
      when: dropbox_enable_mount | bool

    - name: Print Dropbox status
      ansible.builtin.debug:
        msg:
          - "Dropbox wurde mit rclone konfiguriert."
          - "Remote: {{ dropbox_remote_name }}:"
          - "Config: {{ dropbox_config_file }}"
          - "Download aktiv: {{ dropbox_copy_enable }}"
          - "Dropbox-Quelle: {{ dropbox_remote_name }}:{{ dropbox_source_path }}"
          - "Download-Ziel: {{ dropbox_download_dir }}"
          - "Zeitplan: {{ dropbox_copy_schedule }}"
          - "Manueller Einmal-Start: sudo systemctl start dropbox-rclone-copy.service"
          - "Log-Datei: {{ dropbox_copy_log_file }}"
          - "Filter: {{ (dropbox_filter_patterns | join(', ')) if (dropbox_filter_patterns | length > 0) else 'kein Filter' }}"
          - "Mount aktiv: {{ dropbox_enable_mount }}"
          - "Mount-Pfad: {{ dropbox_mount_point }}"
