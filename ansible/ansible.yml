---
- name: Install Docker and Docker-Compose on Raspberry Pi 3
  hosts: all
  become: yes
  vars:
    influx_admin_token: "{{ lookup('env','INFLUX_ADMIN_TOKEN') | default('raspi-admin-token', true) }}"

  tasks:
    - name: Update apt cache and upgrade system
      apt:
        update_cache: yes
        cache_valid_time: 3600
        upgrade: safe

    - name: Install Docker and Docker-Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Get current user's home directory
      shell: echo $HOME
      register: user_home
      become: no
      changed_when: false

    - name: Create certificates directory
      file:
        path: "{{ user_home.stdout }}/tmp/certs"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Check if CA certificate exists
      stat:
        path: "{{ user_home.stdout }}/tmp/certs/ca.crt"
      register: ca_cert

    - name: Create service directories
      file:
        path: "{{ user_home.stdout }}/{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - node-red
        - grafana
        - influxdb
        - mosquitto/data
        - mosquitto/log

    - name: Ensure scripts directory exists and is writable
      file:
        path: "{{ user_home.stdout }}/raspi-iot/scripts"
        state: directory
        mode: '0775'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Fix ownership on scripts directory recursively
      file:
        path: "{{ user_home.stdout }}/raspi-iot/scripts"
        state: directory
        recurse: yes
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Generate CA key and certificate
      shell: |
        openssl genrsa -out ca.key 2048
        openssl req -new -x509 -key ca.key -out ca.crt -subj "/CN=raspi ca"
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/tmp/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Generate server certificate
      shell: |
        openssl genrsa -out raspi.key 2048
        openssl req -new -key raspi.key -out raspi.csr -subj "/CN=raspi.local"
        openssl x509 -req -in raspi.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out raspi.crt -sha256
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/tmp/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Check server certificate has SAN for mosquitto
      shell: |
        openssl x509 -in raspi.crt -noout -text | grep -q "DNS:mosquitto"
      args:
        chdir: "{{ user_home.stdout }}/tmp/certs"
      register: san_check
      changed_when: false
      failed_when: false

    - name: Create OpenSSL config with SAN entries
      copy:
        dest: "{{ user_home.stdout }}/tmp/certs/openssl.cnf"
        content: |
          [ req ]
          default_bits        = 2048
          prompt              = no
          default_md          = sha256
          req_extensions      = v3_req
          distinguished_name  = req_distinguished_name

          [ req_distinguished_name ]
          CN = mosquitto

          [ v3_req ]
          subjectAltName = @alt_names

          [ alt_names ]
          DNS.1 = mosquitto
          DNS.2 = raspi.local
      when: san_check.rc != 0

    - name: Regenerate server CSR with SAN
      shell: |
        openssl req -new -key raspi.key -out raspi.csr -config openssl.cnf -reqexts v3_req
      args:
        chdir: "{{ user_home.stdout }}/tmp/certs"
      when: san_check.rc != 0
      become_user: "{{ ansible_user_id }}"

    - name: Sign server certificate with SAN
      shell: |
        openssl x509 -req -in raspi.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out raspi.crt -days 3650 -sha256 -extensions v3_req -extfile openssl.cnf
      args:
        chdir: "{{ user_home.stdout }}/tmp/certs"
      when: san_check.rc != 0
      become_user: "{{ ansible_user_id }}"

    - name: Ensure certs directory has correct permissions
      file:
        path: "{{ user_home.stdout }}/tmp/certs"
        state: directory
        mode: '0755'
      become_user: "{{ ansible_user_id }}"

    - name: Set permissions on certificate files
      file:
        path: "{{ item.path }}"
        mode: "{{ item.mode }}"
      loop:
        - { path: "{{ user_home.stdout }}/tmp/certs/ca.crt", mode: '0644' }
        - { path: "{{ user_home.stdout }}/tmp/certs/raspi.crt", mode: '0644' }
        - { path: "{{ user_home.stdout }}/tmp/certs/raspi.key", mode: '0644' }
      when: item.path is file
      become_user: "{{ ansible_user_id }}"

    - name: Create systemd service for docker-compose
      copy:
        dest: /etc/systemd/system/docker-compose-app.service
        content: |
          [Unit]
          Description=Docker Compose Application Service
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ user_home.stdout }}/raspi-iot
          User=raspi
          Group=raspi
          ExecStart=/usr/bin/docker-compose up -d
          ExecStop=/usr/bin/docker-compose down
          TimeoutStartSec=0

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Enable and start docker-compose service
      systemd:
        name: docker-compose-app
        enabled: yes
        daemon_reload: yes

    - name: Start InfluxDB only
      shell: |
        cd {{ user_home.stdout }}/raspi-iot
        docker-compose up -d influxdb
      become_user: "{{ ansible_user_id }}"
      changed_when: false

    - name: Wait for InfluxDB CLI ping to succeed
      shell: |
        docker exec influxdb influx ping --host http://localhost:8086
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: influx_ping
      retries: 30
      delay: 2
      until: influx_ping.rc == 0
      changed_when: false
      become_user: "{{ ansible_user_id }}"

    - name: Validate admin token can list authorizations and write output
      shell: |
        docker exec -e INFLUX_TOKEN={{ influx_admin_token }} influxdb sh -lc '
          influx auth list --org home --json > /var/lib/influxdb2/auth-list.json 2>&1
        '
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: auth_list_check
      changed_when: false
      failed_when: auth_list_check.rc != 0

    - name: Ensure InfluxDB bucket "network" exists
      shell: |
        docker exec -e INFLUX_TOKEN={{ influx_admin_token }} influxdb sh -lc '
            if influx bucket list --org home --json | grep -q "\"name\":\"network\""; then
            echo exists
            exit 0
          else
            influx bucket create -n network -o home -r 0
            echo created
          fi
          '
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: ensure_network_bucket
      changed_when: ensure_network_bucket.stdout is search('created')

    - name: Check existing token files
      stat:
        path: "{{ user_home.stdout }}/raspi-iot/influxdb/{{ item }}.token"
      loop:
        - grafana-read
        - telegraf-write
      register: token_file_stats

    - name: Slurp existing Grafana token if present
      slurp:
        src: "{{ user_home.stdout }}/raspi-iot/influxdb/grafana-read.token"
      when: token_file_stats.results[0].stat.exists
      register: grafana_token_slurp

    - name: Set grafana_token from existing file
      set_fact:
        grafana_token: "{{ grafana_token_slurp.content | b64decode | trim }}"
      when: token_file_stats.results[0].stat.exists

    - name: Slurp existing Telegraf token if present
      slurp:
        src: "{{ user_home.stdout }}/raspi-iot/influxdb/telegraf-write.token"
      when: token_file_stats.results[1].stat.exists
      register: telegraf_token_slurp

    - name: Set telegraf_token from existing file
      set_fact:
        telegraf_token: "{{ telegraf_token_slurp.content | b64decode | trim }}"
      when: token_file_stats.results[1].stat.exists

    - name: Create Grafana read token (JSON)
      shell: |
        docker exec -e INFLUX_TOKEN={{ influx_admin_token }} influxdb \
          influx auth create -o home --read-buckets -d grafana-read --json
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: grafana_create
      changed_when: false
      become_user: "{{ ansible_user_id }}"
      when: (grafana_token | default('')) | length == 0

    - name: Extract Grafana token from create JSON
      set_fact:
        grafana_token: "{{ (grafana_create.stdout | default('') | trim | from_json).token | default('') }}"
      when: (grafana_token | default('')) | length == 0 and grafana_create.stdout is defined and (grafana_create.stdout | trim) | length > 0

    - name: Fallback list authorizations for Grafana token
      shell: |
        docker exec -e INFLUX_TOKEN={{ influx_admin_token }} influxdb \
          influx auth list --org home --json
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: grafana_list
      changed_when: false
      become_user: "{{ ansible_user_id }}"
      when: (grafana_token | default('')) | length == 0

    - name: Set Grafana token from list JSON
      set_fact:
        grafana_token: "{{ (grafana_list.stdout | default('[]') | from_json | selectattr('description','equalto','grafana-read') | map(attribute='token') | list | first | default('')) }}"
      when: (grafana_token | default('')) | length == 0

    - name: Create Telegraf write token (JSON)
      shell: |
        docker exec -e INFLUX_TOKEN={{ influx_admin_token }} influxdb \
          influx auth create -o home --write-buckets -d telegraf-write --json
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: telegraf_create
      changed_when: false
      become_user: "{{ ansible_user_id }}"
      when: (telegraf_token | default('')) | length == 0

    - name: Extract Telegraf token from create JSON
      set_fact:
        telegraf_token: "{{ (telegraf_create.stdout | default('') | trim | from_json).token | default('') }}"
      when: (telegraf_token | default('')) | length == 0 and telegraf_create.stdout is defined and (telegraf_create.stdout | trim) | length > 0

    - name: Fallback list authorizations for Telegraf token
      shell: |
        docker exec -e INFLUX_TOKEN={{ influx_admin_token }} influxdb \
          influx auth list --org home --json
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: telegraf_list
      changed_when: false
      become_user: "{{ ansible_user_id }}"
      when: (telegraf_token | default('')) | length == 0

    - name: Set Telegraf token from list JSON
      set_fact:
        telegraf_token: "{{ (telegraf_list.stdout | default('[]') | from_json | selectattr('description','equalto','telegraf-write') | map(attribute='token') | list | first | default('')) }}"
      when: (telegraf_token | default('')) | length == 0

    - name: Write tokens into host volume (mapped to /var/lib/influxdb2)
      copy:
        dest: "{{ user_home.stdout }}/raspi-iot/influxdb/{{ item.name }}.token"
        content: "{{ item.value }}"
        mode: '0600'
      loop:
        - { name: 'grafana-read', value: "{{ grafana_token }}" }
        - { name: 'telegraf-write', value: "{{ telegraf_token }}" }

    - name: Slurp InfluxDB tokens
      slurp:
        src: "{{ user_home.stdout }}/raspi-iot/influxdb/{{ item }}"
      loop:
        - grafana-read.token
        - telegraf-write.token
      register: slurped_tokens

    - name: Fail if any token is empty
      fail:
        msg: "Token {{ item.item }} is empty. Check admin token or Influx CLI permissions."
      when: (item.content | b64decode | trim) | length == 0
      loop: "{{ slurped_tokens.results }}"

    - name: Extract decoded tokens
      set_fact:
        grafana_token: "{{ slurped_tokens.results[0].content | b64decode | trim }}"
        telegraf_token: "{{ slurped_tokens.results[1].content | b64decode | trim }}"

    - name: Ensure tmp/grafana directory exists
      file:
        path: "{{ user_home.stdout }}/tmp/grafana"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Copy provisioning directory recursively to tmp
      copy:
        src: "{{ user_home.stdout }}/raspi-iot/config/grafana/provisioning"
        dest: "{{ user_home.stdout }}/tmp/grafana"
        remote_src: yes
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"
    
    - name: Update token in copied influxdb.yaml
      lineinfile:
        path: "{{ user_home.stdout }}/tmp/grafana/provisioning/datasources/influxdb.yaml"
        regexp: '^\s*token:\s*.*$'
        line: "      token: {{ grafana_token }}"

    - name: Write project .env with Telegraf token
      copy:
        dest: "{{ user_home.stdout }}/raspi-iot/.env"
        content: "TELEGRAF_INFLUX_TOKEN={{ telegraf_token }}\n"
        mode: '0600'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Ensure entire project is owned by raspi
      file:
        path: "{{ user_home.stdout }}/raspi-iot"
        state: directory
        recurse: yes
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Start remaining services
      shell: |
        cd {{ user_home.stdout }}/raspi-iot
        docker-compose up -d
      become_user: "{{ ansible_user_id }}"

    - name: Display success message
      debug:
        msg: "Docker and Docker-Compose installed successfully! Docker-compose will start automatically on boot. Please re-login for group changes to take effect."
