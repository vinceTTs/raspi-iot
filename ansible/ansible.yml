---
- name: Install Docker and Docker-Compose on Raspberry Pi 3
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache and upgrade system
      apt:
        update_cache: yes
        cache_valid_time: 3600
        upgrade: safe

    - name: Install Docker and Docker-Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Get current user's home directory
      shell: echo $HOME
      register: user_home
      become: no
      changed_when: false

    - name: Create certificates directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/certs"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Check if CA certificate exists
      stat:
        path: "{{ user_home.stdout }}/raspi-iot/certs/ca.crt"
      register: ca_cert

    - name: Create service directories
      file:
        path: "{{ user_home.stdout }}/raspi-iot/{{ item }}"
        state: directory
        mode: '0777'
      loop:
        - node-red
        - grafana
        - influxdb
        - mosquitto/data
        - mosquitto/log

    - name: Generate CA key and certificate
      shell: |
        openssl genrsa -out ca.key 2048
        openssl req -new -x509 -key ca.key -out ca.crt -subj "/CN=Mosquitto CA"
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Generate server certificate
      shell: |
        openssl genrsa -out server.key 2048
        openssl req -new -key server.key -out server.csr -subj "/CN=raspi.local"
        openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out server.crt -days 3650 -sha256
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Set certificate permissions
      file:
        path: "{{ user_home.stdout }}/raspi-iot/certs"
        recurse: yes
        mode: '0644'
      when: not ca_cert.stat.exists
      become_user: "{{ ansible_user_id }}"

    - name: Create systemd service for docker-compose
      copy:
        dest: /etc/systemd/system/docker-compose-app.service
        content: |
          [Unit]
          Description=Docker Compose Application Service
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ user_home.stdout }}/raspi-iot
          ExecStart=/usr/bin/docker-compose up -d
          ExecStop=/usr/bin/docker-compose down
          TimeoutStartSec=0

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Enable and start docker-compose service
      systemd:
        name: docker-compose-app
        enabled: yes
        daemon_reload: yes

    - name: Start InfluxDB only
      shell: |
        cd {{ user_home.stdout }}/raspi-iot
        docker-compose up -d influxdb
      become_user: "{{ ansible_user_id }}"
      changed_when: false

    - name: Wait for InfluxDB CLI ping to succeed
      shell: |
        docker exec influxdb influx ping --host http://localhost:8086
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: influx_ping
      retries: 30
      delay: 2
      until: influx_ping.rc == 0
      changed_when: false
      become_user: "{{ ansible_user_id }}"

    - name: Create Grafana read-only token and persist (single step)
      shell: |
        docker exec -e INFLUX_TOKEN=raspi-admin-token influxdb sh -lc '
          TOK=$(influx auth list --org home | awk "NR>1 && $2==\"grafana-read\"{print $3; exit}");
          if [ -z "$TOK" ]; then
            influx auth create -o home --read-buckets -d grafana-read >/dev/null 2>&1 || true;
            TOK=$(influx auth list --org home | awk "NR>1 && $2==\"grafana-read\"{print $3; exit}");
          fi;
          if [ -n "$TOK" ]; then echo "$TOK" > /var/lib/influxdb2/grafana-read.token; else echo "" > /var/lib/influxdb2/grafana-read.token; fi
        '
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      become_user: "{{ ansible_user_id }}"

    - name: Slurp grafana-read.token
      slurp:
        src: "{{ user_home.stdout }}/raspi-iot/influxdb/grafana-read.token"
      register: grafana_token

    - name: Fail if grafana-read.token is empty
      fail:
        msg: "grafana-read.token is empty. Ensure admin token is valid and Influx CLI supports --read-buckets."
      when: (grafana_token.content | b64decode | trim) | length == 0

    - name: Update Grafana datasource to use read-only token
      lineinfile:
        path: "{{ user_home.stdout }}/raspi-iot/config/grafana-datasource-influxdb.yaml"
        regexp: '^\s*token:\s*.*$'
        line: '      token: {{ (grafana_token.content | b64decode) | trim }}'
      when: grafana_token is defined

    - name: Create Telegraf write token and persist (single step)
      shell: |
        docker exec -e INFLUX_TOKEN=raspi-admin-token influxdb sh -lc '
          TOK=$(influx auth list --org home | awk "NR>1 && $2==\"telegraf-write\"{print $3; exit}");
          if [ -z "$TOK" ]; then
            influx auth create -o home --write-buckets -d telegraf-write >/dev/null 2>&1 || true;
            TOK=$(influx auth list --org home | awk "NR>1 && $2==\"telegraf-write\"{print $3; exit}");
          fi;
          if [ -n "$TOK" ]; then echo "$TOK" > /var/lib/influxdb2/telegraf-write.token; else echo "" > /var/lib/influxdb2/telegraf-write.token; fi
        '
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      become_user: "{{ ansible_user_id }}"

    - name: Slurp telegraf-write.token
      slurp:
        src: "{{ user_home.stdout }}/raspi-iot/influxdb/telegraf-write.token"
      register: telegraf_token

    - name: Fail if telegraf-write.token is empty
      fail:
        msg: "telegraf-write.token is empty. Ensure admin token is valid and Influx CLI supports --write-buckets."
      when: (telegraf_token.content | b64decode | trim) | length == 0

    - name: Write Telegraf env file with token
      file:
        path: "{{ user_home.stdout }}/raspi-iot/influxdb"
        state: directory
        mode: '0777'

    - name: Write Telegraf env file with token
      copy:
        dest: "{{ user_home.stdout }}/raspi-iot/influxdb/telegraf.env"
        content: "INFLUX_TOKEN={{ (telegraf_token.content | b64decode) | trim }}\n"
        mode: '0600'

    - name: Start remaining services
      shell: |
        cd {{ user_home.stdout }}/raspi-iot
        docker-compose up -d
      become_user: "{{ ansible_user_id }}"

    - name: Display success message
      debug:
        msg: "Docker and Docker-Compose installed successfully! Docker-compose will start automatically on boot. Please re-login for group changes to take effect."
