---
- name: Install Docker and Docker-Compose on Raspberry Pi 3
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker and Docker-Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Get current user's home directory
      shell: echo $HOME
      register: user_home
      become: no
      changed_when: false

    - name: Create certificates directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/certs"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Check if CA certificate exists
      stat:
        path: "{{ user_home.stdout }}/raspi-iot/certs/ca.crt"
      register: ca_cert

    - name: Create node-red directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/node-red"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Generate CA key and certificate
      shell: |
        openssl genrsa -out ca.key 2048
        openssl req -new -x509 -key ca.key -out ca.crt -days 3650 -subj "/CN=Mosquitto CA"
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Generate server certificate
      shell: |
        openssl genrsa -out server.key 2048
        openssl req -new -key server.key -out server.csr -subj "/CN=raspi.local"
        openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out server.crt -days 3650 -sha256
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Set certificate permissions
      file:
        path: "{{ user_home.stdout }}/raspi-iot/certs"
        recurse: yes
        mode: '0644'
      when: not ca_cert.stat.exists
      become_user: "{{ ansible_user_id }}"

    - name: Create systemd service for docker-compose
      copy:
        dest: /etc/systemd/system/docker-compose-app.service
        content: |
          [Unit]
          Description=Docker Compose Application Service
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ user_home.stdout }}/raspi-iot
          ExecStart=/usr/bin/docker-compose up -d
          ExecStop=/usr/bin/docker-compose down
          TimeoutStartSec=0

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Enable and start docker-compose service
      systemd:
        name: docker-compose-app
        enabled: yes
        daemon_reload: yes

    - name: Ensure docker-compose is running with latest config
      shell: |
        cd {{ user_home.stdout }}/raspi-iot
        docker-compose up -d
      become_user: "{{ ansible_user_id }}"
      changed_when: false

    - name: Display success message
      debug:
        msg: "Docker and Docker-Compose installed successfully! Docker-compose will start automatically on boot. Please re-login for group changes to take effect."
