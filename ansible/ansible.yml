---
- name: Install Docker and Docker-Compose on Raspberry Pi 3
  hosts: all
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Upgrade packages (safe)
      apt:
        upgrade: safe

    - name: Install Docker and Docker-Compose
      apt:
        name:
          - docker.io
          - docker-compose
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add current user to docker group
      user:
        name: "{{ ansible_user_id }}"
        groups: docker
        append: yes

    - name: Get current user's home directory
      shell: echo $HOME
      register: user_home
      become: no
      changed_when: false

    - name: Create certificates directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/certs"
        state: directory
        mode: '0755'
        owner: "{{ ansible_user_id }}"
        group: "{{ ansible_user_id }}"

    - name: Check if CA certificate exists
      stat:
        path: "{{ user_home.stdout }}/raspi-iot/certs/ca.crt"
      register: ca_cert

    - name: Create node-red directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/node-red"
        state: directory
        mode: '0777'

    - name: Create grafana directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/grafana"
        state: directory
        mode: '0777'

    - name: Create influxdb directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/influxdb"
        state: directory
        mode: '0777'

    - name: Create mosquitto data directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/mosquitto/data"
        state: directory
        mode: '0777'

    - name: Create mosquitto log directory
      file:
        path: "{{ user_home.stdout }}/raspi-iot/mosquitto/log"
        state: directory
        mode: '0777'

    - name: Generate CA key and certificate
      shell: |
        openssl genrsa -out ca.key 2048
        openssl req -new -x509 -key ca.key -out ca.crt -days 3650 -subj "/CN=Mosquitto CA"
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Generate server certificate
      shell: |
        openssl genrsa -out server.key 2048
        openssl req -new -key server.key -out server.csr -subj "/CN=raspi.local"
        openssl x509 -req -in server.csr -CA ca.crt -CAkey ca.key -CAcreateserial -out server.crt -days 3650 -sha256
      when: not ca_cert.stat.exists
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot/certs"
      become_user: "{{ ansible_user_id }}"

    - name: Set certificate permissions
      file:
        path: "{{ user_home.stdout }}/raspi-iot/certs"
        recurse: yes
        mode: '0644'
      when: not ca_cert.stat.exists
      become_user: "{{ ansible_user_id }}"

    - name: Create systemd service for docker-compose
      copy:
        dest: /etc/systemd/system/docker-compose-app.service
        content: |
          [Unit]
          Description=Docker Compose Application Service
          Requires=docker.service
          After=docker.service

          [Service]
          Type=oneshot
          RemainAfterExit=yes
          WorkingDirectory={{ user_home.stdout }}/raspi-iot
          ExecStart=/usr/bin/docker-compose up -d
          ExecStop=/usr/bin/docker-compose down
          TimeoutStartSec=0

          [Install]
          WantedBy=multi-user.target
        mode: '0644'

    - name: Enable and start docker-compose service
      systemd:
        name: docker-compose-app
        enabled: yes
        daemon_reload: yes

    - name: Ensure docker-compose is running with latest config
      shell: |
        cd {{ user_home.stdout }}/raspi-iot
        docker-compose up -d
      become_user: "{{ ansible_user_id }}"
      changed_when: false

    - name: Wait for InfluxDB port to be ready
      wait_for:
        host: 127.0.0.1
        port: 8086
        delay: 2
        timeout: 120

    - name: Wait for InfluxDB CLI ping to succeed
      shell: |
        docker exec influxdb influx ping --host http://localhost:8086
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      register: influx_ping
      retries: 30
      delay: 2
      until: influx_ping.rc == 0
      changed_when: false
      become_user: "{{ ansible_user_id }}"

    - name: Create Grafana read-only token for all buckets (simplified)
      shell: |
        docker exec -e INFLUX_TOKEN=raspi-admin-token influxdb sh -lc '
          ORG_ID=$(influx org list | awk "NR>1 && $2==\"home\" {print $1; exit}");
          cat > /tmp/payload.json <<EOF
          {"orgID":"$ORG_ID","description":"grafana","permissions":[{"action":"read","resource":{"type":"buckets","orgID":"$ORG_ID"}}]}
          EOF
          curl -sS -X POST http://localhost:8086/api/v2/authorizations \
            -H "Authorization: Token $INFLUX_TOKEN" \
            -H "Content-Type: application/json" \
            --data @/tmp/payload.json \
            -w "%{http_code}" -o /var/lib/influxdb2/grafana-auth.json \
            > /var/lib/influxdb2/grafana-auth.status;
          CODE=$(cat /var/lib/influxdb2/grafana-auth.status || echo "");
          if [ "$CODE" != "201" ] && [ "$CODE" != "200" ]; then
            echo "{\"error\":\"authorization creation failed\",\"status\":\"$CODE\"}" > /var/lib/influxdb2/grafana-auth.json;
          fi
        '
      args:
        chdir: "{{ user_home.stdout }}/raspi-iot"
      become_user: "{{ ansible_user_id }}"

    - name: Check grafana-auth.json presence
      stat:
        path: "{{ user_home.stdout }}/raspi-iot/influxdb/grafana-auth.json"
      register: grafana_auth_json_stat

    - name: Fail if grafana-auth.json not found
      fail:
        msg: "grafana-auth.json not found. Token creation may have failed. Ensure admin token is valid (raspi-admin-token) or reinitialize InfluxDB."
      when: not grafana_auth_json_stat.stat.exists

    - name: Slurp grafana-auth.json
      slurp:
        src: "{{ user_home.stdout }}/raspi-iot/influxdb/grafana-auth.json"
      register: grafana_auth

    - name: Extract token and write to file
      copy:
        dest: "{{ user_home.stdout }}/raspi-iot/influxdb/grafana-read.token"
        content: "{{ (grafana_auth.content | b64decode | from_json).token }}"
      when: grafana_auth is defined

    - name: Update Grafana datasource to use read-only token
      lineinfile:
        path: "{{ user_home.stdout }}/raspi-iot/config/grafana-datasource-influxdb.yaml"
        regexp: '^\s*token:\s*.*$'
        line: '      token: {{ (grafana_auth.content | b64decode | from_json).token }}'
      when: grafana_auth is defined

    - name: Restart Grafana to apply new datasource token
      shell: |
        cd {{ user_home.stdout }}/raspi-iot
        docker-compose up -d grafana
      become_user: "{{ ansible_user_id }}"
      when: grafana_auth is defined

    - name: Display success message
      debug:
        msg: "Docker and Docker-Compose installed successfully! Docker-compose will start automatically on boot. Please re-login for group changes to take effect."
