services:
  speedtest:
    image: alpine:3.19
    container_name: speedtest
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_ORG=home
      - INFLUX_BUCKET=network
      - INFLUX_TOKEN=${TELEGRAF_INFLUX_TOKEN}
    networks:
      - iot-net
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: /bin/sh
    command: "/scripts/run.sh"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f run.sh >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

networks:
  iot-net:
    external: true
