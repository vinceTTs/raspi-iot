services:
  traefik:
    image: traefik:v3.6.7
    container_name: traefik
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - iot-net
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost/ping || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  iot-net:
    external: true
