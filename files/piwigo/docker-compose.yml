services:
  mariadb:
    image: mariadb:10.6
    container_name: piwigo-db
    restart: always
    environment:
      - MYSQL_DATABASE=piwigo
      - MYSQL_USER=piwigo
      - MYSQL_PASSWORD=${PIWIGO_DB_PASSWORD:-piwigo123}
      - MYSQL_ROOT_PASSWORD=${PIWIGO_DB_ROOT_PASSWORD:-root123}
    volumes:
      - ./db:/var/lib/mysql
    networks:
      - iot-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${PIWIGO_DB_ROOT_PASSWORD:-root123} | grep -q 'mysqld is alive' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  piwigo:
    image: lscr.io/linuxserver/piwigo:latest
    container_name: piwigo
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Berlin
    volumes:
      - ./config:/config
      - ./gallery:/gallery
    networks:
      - iot-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.piwigo.rule=Host(`raspi.local`)"
      - "traefik.http.routers.piwigo.entrypoints=web"
      - "traefik.http.routers.piwigo.priority=1"
      - "traefik.docker.network=iot-net"
      - "traefik.http.services.piwigo.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/install.php || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

networks:
  iot-net:
    external: true
