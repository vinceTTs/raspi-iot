services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - grafana
      - influxdb
      - node-red
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "8883:8883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./certs:/mosquitto/config/certs
    restart: unless-stopped

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    volumes:
      - ./config/telegraf.conf:/etc/telegraf/telegraf.conf
      - ./certs:/etc/telegraf/certs
      - ./influxdb/data:/var/lib/influxdb2
    depends_on:
      influxdb:
        condition: service_healthy
      setup-telegraf-token:
        condition: service_completed_successfully
      mosquitto:
        condition: service_started
    env_file:
      - ./influxdb/telegraf.env
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb:/var/lib/influxdb2
      - ./scripts:/scripts:ro
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=home
      - DOCKER_INFLUXDB_INIT_BUCKET=sensors
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=raspi-admin-token
      - INFLUXB_MONITOR_STORE_ENABLED=true
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped

  setup-telegraf-token:
    image: influxdb:2.7
    container_name: setup-telegraf-token
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - INFLUX_TOKEN=raspi-admin-token
    entrypoint: ["/bin/sh", "-lc"]
    command: >
      "if [ -s /out/telegraf.env ]; then exit 0; fi;
      influx ping --host http://influxdb:8086;
      TOKEN=$(influx auth create -o home --write-buckets -d telegraf-write --json | sed -n 's/.*\"token\":\"\([^\"]\+\)\".*/\1/p');
      if [ -n \"$TOKEN\" ]; then echo \"INFLUX_TOKEN=$TOKEN\" > /out/telegraf.env; else exit 1; fi"
    volumes:
      - ./influxdb:/out
    restart: "no"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana:/var/lib/grafana
      - ./influxdb:/var/lib/influxdb2:ro
      - ./config/grafana-datasource-influxdb.yaml:/etc/grafana/provisioning/datasources/influxdb.yaml
    environment:
      - GF_SERVER_ROOT_URL=http://raspi.local/
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    depends_on:
      - influxdb
    restart: unless-stopped

  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    volumes:
      - ./node-red:/data
    environment:
      - TZ=Europe/Berlin
    depends_on:
      - mosquitto
    restart: unless-stopped

