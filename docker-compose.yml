services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - grafana
      - influxdb
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "8883:8883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./certs:/mosquitto/config/certs
    restart: unless-stopped

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "/init/scripts/influxdb-create-token-telegraf.sh &&
      telegraf"
    volumes:
      - ./config/telegraf.conf:/etc/telegraf/telegraf.conf
      - ./certs:/etc/telegraf/certs
      - ./influxdb/data:/var/lib/influxdb2
    depends_on:
      - mosquitto
      - influxdb
    environment:
      - INFLUX_TOKEN_FILE=/run/secrets/telegraf.token
    restart: unless-stopped

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb:/var/lib/influxdb2
      - ./scripts/influxdb-create-token-grafana.sh:/docker-entrypoint-initdb.d/create-token-grafana.sh
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=home
      - DOCKER_INFLUXDB_INIT_BUCKET=sensors
      - INFLUXB_MONITOR_STORE_ENABLED=true
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana:/var/lib/grafana
      - ./influxdb:/var/lib/influxb2:ro
      - ./config/grafana-datasource-influxdb.yaml:/var/lib/grafana/provisioning/datasources/influxdb.yaml
    environment:
      - GF_SERVER_ROOT_URL=http://raspi.local/
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - INFLUXB_TOKEN_FILE=/var/lib/influxdb2/grafana-token
    restart: unless-stopped

