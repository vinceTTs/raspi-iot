services:
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - grafana
      - influxdb
      - node-red
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "8883:8883"
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
      - ./certs:/mosquitto/config/certs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'ps aux | grep -v grep | grep mosquitto >/dev/null' "]
      interval: 30s
      timeout: 5s
      retries: 5

  telegraf:
    image: telegraf:latest
    container_name: telegraf
    volumes:
      - ./config/telegraf.conf:/etc/telegraf/telegraf.conf
      - ./certs:/etc/telegraf/certs
      - ./influxdb/data:/var/lib/influxdb2
    depends_on:
      influxdb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      - INFLUX_TOKEN=${TELEGRAF_INFLUX_TOKEN}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'ps aux | grep -v grep | grep telegraf >/dev/null' "]
      interval: 30s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - ./influxdb:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=home
      - DOCKER_INFLUXDB_INIT_BUCKET=sensors
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=raspi-admin-token
      - INFLUXB_MONITOR_STORE_ENABLED=true
    healthcheck:
      test: ["CMD", "influx", "ping", "--host", "http://localhost:8086"]
      interval: 5s
      timeout: 3s
      retries: 30
    restart: unless-stopped



  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    volumes:
      - ./grafana:/var/lib/grafana
      - ./influxdb:/var/lib/influxdb2:ro
      - ./config/grafana-datasource-influxdb.yaml:/etc/grafana/provisioning/datasources/influxdb.yaml
    environment:
      - GF_SERVER_ROOT_URL=http://raspi.local/
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    depends_on:
      - influxdb
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    volumes:
      - ./node-red:/data
    environment:
      - TZ=Europe/Berlin
    depends_on:
      - mosquitto
    restart: unless-stopped

  speedtest:
    image: alpine:3.19
    container_name: speedtest
    depends_on:
      influxdb:
        condition: service_healthy
    environment:
      - INFLUX_URL=http://influxdb:8086
      - INFLUX_ORG=home
      - INFLUX_BUCKET=network
      - INFLUX_TOKEN=${TELEGRAF_INFLUX_TOKEN}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: /bin/sh
    command: "/scripts/run-speedtest.sh"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f run-speedtest.sh >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

