apiVersion: 1

datasources:
  - name: InfluxDB
    uid: influxdb
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: home
      defaultBuckets: sensors
      tlsSkipVerify: false
    secureJsonData:
      token: REPLACE_WITH_TOKEN
    basicAuth: false
    isDefault: true
