apiVersion: 1

datasources:
  - name: InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    jsonData:
      version: Flux
      organization: home
      defaultBuckets: sensors
      tlsSkipVerify: false
    secureJsonData:
      token: raspi-admin-token
    basicAuth: false
